<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sell a Part | PartSeekr</title>
  <meta name="description" content="List your auto part on PartSeekr and reach local buyers.">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 0.5rem; margin: 0.5rem 0 1rem; }
    .preview-grid img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; border: 1px solid #334155; }
    .upload-hint { color: var(--muted); font-size: 0.85rem; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="/" class="logo">PartSeekr</a>
    <nav>
      <a href="/">Parts</a>
      <a href="/demand.html">Demand Board</a>
      <a href="/sell.html">Sell a Part</a>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Sell a Part</h1>
      <p>Add your part with photos. Buyers can check out instantly.</p>
    </section>

    <section class="form-section">
      <form id="sellForm" enctype="multipart/form-data">
        <input type="text" id="sTitle" name="title" placeholder="Part title" required>
        <input type="text" id="sPartNumber" name="partNumber" placeholder="Part number" required>
        <input type="text" id="sBrand" name="brand" placeholder="Brand" required>
        <input type="text" id="sCategory" name="category" placeholder="Category e.g. Brakes" required>
        <input type="text" id="sCondition" name="condition" placeholder="Condition: New, Used, Reman" required>
        <input type="number" id="sPrice" name="price" placeholder="Price ($)" min="0" step="0.01" required>
        <input type="number" id="sInventory" name="inventory" placeholder="Quantity in stock" min="0" value="1" required>
        <input type="text" id="sFits" name="fits" placeholder="Fits: year/make/model" required>
        <textarea id="sDescription" name="description" placeholder="Description" required></textarea>
        <input type="text" id="sTags" name="tags" placeholder="Tags separated by commas" required>

        <label class="upload-hint">Upload up to 5 photos of your part *</label>
        <input type="file" id="sPhotos" name="photos" accept="image/*" multiple required>
        <div id="photoPreview" class="preview-grid"></div>

        <button type="submit" class="btn btn-primary">List Part</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="year"></span> PartSeekr. Local auto parts, found fast.</p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const photoInput = document.getElementById('sPhotos');
    const preview = document.getElementById('photoPreview');

    photoInput.addEventListener('change', () => {
      preview.innerHTML = '';
      Array.from(photoInput.files).slice(0, 5).forEach(file => {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        preview.appendChild(img);
      });
    });

    document.getElementById('sellForm').addEventListener('submit', async e => {
      e.preventDefault();
      const form = e.target;
      const data = new FormData(form);

      // Replace file list with up to 5 files named photos0..photos4
      const files = Array.from(photoInput.files).slice(0, 5);
      data.delete('photos');
      files.forEach((file, i) => data.append(`photos${i}`, file));

      const res = await fetch('/api/listings/upload', {
        method: 'POST',
        body: data,
      });

      if (res.ok) {
        const result = await res.json();
        alert('Listed! View it at /part/' + result.id);
        window.location.href = '/part/' + result.id;
      } else {
        const err = await res.text();
        alert('Failed to list part: ' + err);
      }
    });
  </script>
</body>
</html>
